# Full containerized deployment — one command: `docker compose up -d --build`.
#
# Application:   postgres, backend (NestJS), frontend (nginx)
# Log mgmt:      elasticsearch, logstash, kibana  (+ setup bootstrap)
# Monitoring:    prometheus, grafana, node-exporter, postgres-exporter
#
# Passwords are read from .env (see .env.example): DB_PASS, ELASTIC_PASSWORD,
# KIBANA_SYSTEM_PASSWORD, GRAFANA_ADMIN_PASSWORD.

# Own project name so volumes/network don't collide with docker-compose.dev.yml.
name: transcendence-prod

services:
  # ---------------------------------------------------------------- App tier
  postgres:
    image: postgres:16-alpine
    container_name: transcendence-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [transcendence]

  backend:
    build:
      context: ./app-backend
    container_name: transcendence-backend
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      RUN_MIGRATIONS: "true"
      LOG_FILE: /app/logs/backend.log
      LOG_LEVEL: info
      SERVER_PORT: 3000
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [transcendence]

  frontend:
    build:
      context: ./app-frontend
      args:
        # Baked into the bundle; the browser reaches the backend on the host port.
        VITE_API_URL: http://localhost:3000
    container_name: transcendence-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks: [transcendence]

  # ------------------------------------------------------------ ELK log mgmt
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: transcendence-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # Single-node dev/demo stack: don't let a near-full host disk block shard
      # allocation (index would go RED and Logstash couldn't index).
      - cluster.routing.allocation.disk.threshold_enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 10s
      timeout: 10s
      retries: 20
    ports:
      - "9200:9200"
    networks: [transcendence]

  # One-shot: sets kibana_system password + ILM retention policy + template.
  elk-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: transcendence-elk-setup
    user: "0"
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_SYSTEM_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-7}
    volumes:
      - ./observability/setup/setup.sh:/setup.sh:ro
    command: ["bash", "/setup.sh"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [transcendence]

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: transcendence-logstash
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./observability/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./observability/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - backend_logs:/logs:ro
      - logstash_data:/usr/share/logstash/data
    depends_on:
      elasticsearch:
        condition: service_healthy
      elk-setup:
        condition: service_completed_successfully
    networks: [transcendence]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: transcendence-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
      elk-setup:
        condition: service_completed_successfully
    networks: [transcendence]

  # --------------------------------------------------------- Monitoring tier
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: transcendence-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [transcendence]

  grafana:
    image: grafana/grafana:11.2.2
    container_name: transcendence-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks: [transcendence]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: transcendence-node-exporter
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks: [transcendence]

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: transcendence-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [transcendence]

volumes:
  postgres_data:
  backend_logs:
  backend_uploads:
  es_data:
  logstash_data:
  prometheus_data:
  grafana_data:

networks:
  transcendence:
    driver: bridge
