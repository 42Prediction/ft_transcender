server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths resolve to index.html so React Router can
    # handle client-side routes on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for fingerprinted static assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
