# Plain HTTP is not served to the browser — redirect straight to HTTPS.
# Hardcode :5173 because the container's HTTPS port (443) is remapped to host
# port 5173 (see docker-compose.yml) — $host has no port, so a bare redirect
# would point at the (unmapped) default HTTPS port 443 instead.
server {
    listen 80;
    server_name _;
    return 301 https://$host:5173$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Self-signed dev/demo cert generated by `make certs`, mounted read-only.
    ssl_certificate     /certs/cert.pem;
    ssl_certificate_key /certs/key.pem;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths resolve to index.html so React Router can
    # handle client-side routes on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for fingerprinted static assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
