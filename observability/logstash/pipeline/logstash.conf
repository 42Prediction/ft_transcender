# Collect -> transform -> ship the backend's structured logs into Elasticsearch.
#
# The backend (pino) writes newline-delimited JSON to /app/logs/backend.log,
# shared with this container through the `backend_logs` volume mounted at /logs.

input {
  file {
    path => "/logs/backend.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_backend"
    codec => json
  }
}

filter {
  # pino emits numeric log levels; map them to human-readable names.
  translate {
    source => "[level]"
    target => "[log_level]"
    dictionary => {
      "10" => "trace"
      "20" => "debug"
      "30" => "info"
      "40" => "warn"
      "50" => "error"
      "60" => "fatal"
    }
    fallback => "unknown"
  }

  # pino's `time` is epoch milliseconds; use it as the event timestamp.
  date {
    match => ["time", "UNIX_MS"]
    target => "@timestamp"
  }

  mutate {
    add_field => { "service" => "backend" }
    remove_field => ["time"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    # Daily indices; retention is enforced by the ILM policy attached via the
    # `transcendence-logs` index template (see observability/setup/setup.sh).
    index => "transcendence-logs-%{+YYYY.MM.dd}"
  }
}
